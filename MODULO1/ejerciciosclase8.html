    <script>
//Se requiere construir el robot saludador (greetings bot), para ello se deben crear 3 botones:

var nombre
var apellido

const saludador = (tipo) => {
    if (tipo === `nombre`) {
        nombre = prompt(`dame tu nombre`)

    } else if (tipo === `apellido`) {
        apellido = prompt(`Dame tu apellido`)
    }
    console.log(nombre, apellido)
    }

     const saludo = () => {
     const nombreCompleto = (nombre, apellido)
     alert(`Hola ${nombre}  ${apellido}`)
}


  </script>
  
 <button type="button" onclick="saludador(`nombre`)"> nombre </button>
 <button type="button" onclick="saludador(`apellido`)"> apellido </button>
