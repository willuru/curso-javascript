    <script>
            //Hacer un programa que pida 10 numeros al usuario usando un bucle while (usa prompt para pedir los datos y

            //cada uno de los numero por 3.

            var contador = 0
            var lista = []
            while (contador < 10) {
                
                var numero = prompt (`porfavor dame un numero`)
                numero = parseInt(numero)

                lista.push(numero)
                contador++
            }
            const tamañoLista = lista.length
            for (let contador2 = 0;contador2 < lista.length; contador2++) {
             const elementoLista = lista[contador2]

             alert (`El elemento = ${elementoLista} multiplicado por 3 es igual a ${elementoLista * 3}`)

             

            }
            alert (`Fin del ciclo`)
                
        
          













    </script>
