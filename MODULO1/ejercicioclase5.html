<body>
    <script>

        //Numeros mayores y numero menores
//programa que pide al usuario 2 numero y dice cual numero es mayor y cual es menor 

 var primerNumero = prompt(`hola dame el primer numero, por favor`)
var primerNumero = parseInt(primerNumero)

var segundoNumero = prompt(`dame el segundo numero, por favor`)
var segundoNumero = parseInt(segundoNumero)

if (primerNumero > segundoNumero){
  alert(`${primerNumero} es mayor que ${segundoNumero}`)
} else if (primerNumero < segundoNumero){
  alert(`${primerNumero} es menor que ${segundoNumero}`)
}





    </script>
</body>
