// pedir dos numero al usuario con foncion boton y sumarlo , multiplicar, restarlo y dividir.
var numero1
var numero2

const perdirNumeros = () => {
numero1 = parseInt(prompt(`Dame el primer numero`))
numero2 = parseInt(prompt(`Dame el segundo numero`))
}

const suma = () => {
    const resultadoSuma = numero1 + numero2
    alert(`La suma es ${resultadoSuma}`)
}

const resta = () => {
    const resultadoResta = numero1 - numero2
    alert(`La resta es ${resultadoResta}`)
}

const multiplicar = () => {
    const resultadoMultiplicar = numero1 * numero2
    alert(`La multiplicar  es ${resultadoMultiplicar}`)
}

const dividir = () => {
    const resultadoDividir = numero1 / numero2
    alert(`La dividir es ${resultadoDividir}`)
}


</script>
   <button type="button" onclick="perdirNumeros()"> pedir numeros </button>
   <button type="button" onclick="suma()"> sumar </button>
   <button type="button" onclick="resta()"> resta </button>
   <button type="button" onclick="multiplicar()"> multiplicar </button>
   <button type="button" onclick="dividir()"> dividir </button>
